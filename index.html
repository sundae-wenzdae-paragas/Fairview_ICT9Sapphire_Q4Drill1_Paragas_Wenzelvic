<style>
    body{
        background-image:url(https://media.istockphoto.com/id/1160036843/photo/light-bulb-with-wood-house-on-the-table-a-symbol-for-construction-creative-light-bulb-idea.jpg?s=612x612&w=0&k=20&c=VICiOCYrhWwyuNML4lj43C9Msm_vsHSQpTPcwo1kPmw=);

        background-color:rgba(2, 221, 39, 0.4);

<body>
    <br><br>
    <div class="container"><br>
    <h1 class="text-white text-center">Electricity Consumption Classifier Page</h1>
    <p class="text-center text-light">Enter your electricity consumption below to know your consumption level!</p>
    <input type="text" id="kWhusage" class="form-control" placeholder="type here...">
    <button class="btn btn-info" onclick="kWhusage()">Button </button><br><br></div>

    <script>
        //check electricity usage
        function kWhusage(){

        let kWhusage = document.getElementById("kWhusage").value;
        document.getElementById("kWhusage").innerHTML = "Manage your electricity consumption wisely! 😊"; 
        let x = "Invalid Input";
        let y = "Lifeline Consumption";
        let z = "Low Consumption";
        let a = "Average Consumption";
        let b = "High Consumption";
        let c = "Very High Consumption"
        let d = "Wrong Input"

        if (isNaN (kWhusage) && kWhusage <= 0 ){
            alert('You have an ' + x + ': Please input a number above 0.')
        } //checks if the user input a number that is 0 or below
        else if(kWhusage <= 100 && kWhusage > 0 ){
            alert('You have a ' + y + ': Discouned electricity rates')
        }
        else if (kWhusage <= 200 && kWhusage >= 101){
            alert('You have a ' + z + ': Normal residency rate');
        }
        else if(kWhusage <= 300 && kWhusage >= 201){
            alert('You have an ' + a + ': Typical electricity usage');
        }
        else if(kWhusage <= 500 && kWhusage >= 301){
            alert('You have a ' + b + ': Higher electricity usage');
        }
        else if(kWhusage > 500){
            alert('You have a ' + c + ': Heavy electricity user');
        }
        else{
            alert('You have a ' + d + ': Your electricity usage could not be found. Please input a correct number');
        } //checks if the user's input is not a number
    }
    </script>
<br>
